# DNSTT Configuration - High-Performance Server

# Listen on all interfaces, port 53 (requires root)
LISTEN_ADDR="0.0.0.0:53"

# Number of worker threads (1-256)
# Recommended values:
#   - 2-4 for low traffic (< 1k pps)
#   - 8-16 for medium traffic (1k-10k pps)
#   - 32-64 for high traffic (10k-100k pps)
#   - 128-256 for very high traffic (> 100k pps)
WORKERS=32

# Enable verbose logging
VERBOSE=true

# Log file path (optional, leave empty for stdout)
LOG_FILE="/var/log/dnstt/server.log"

# Stats reporting interval in seconds
STATS_INTERVAL=30
